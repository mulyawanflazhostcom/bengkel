name: Build & Deploy to FlazHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Guard: skip kalau HARBOR secrets belum ter-set ATAU tidak ada target
      # (CapRover & Kube dua-duanya kosong). Workflow SUCCESS dengan warning.
      - name: Check config
        id: check
        env:
          HU: ${{ secrets.HARBOR_USERNAME }}
          CAP: ${{ vars.CAPROVER_TARGETS }}
          KUBE: ${{ vars.KUBE_TARGETS }}
        run: |
          # Build skip kalau Harbor belum set, ATAU target platform app kosong.
          NO_CAP=false; NO_KUBE=false
          if [ -z "$CAP" ] || [ "$CAP" = "[]" ]; then NO_CAP=true; fi
          if [ -z "$KUBE" ] || [ "$KUBE" = "[]" ]; then NO_KUBE=true; fi
          if [ -z "$HU" ] || { [ "$NO_CAP" = "true" ] && [ "$NO_KUBE" = "true" ]; }; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::FlazHost secrets/targets belum ter-set. Build & deploy di-skip. Setelah CD setup selesai / commit ulang, workflow jalan normal."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Log in to FlazHost Registry
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: registry.flazhost.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      # Immutable tag guard: Harbor menolak push ulang tag sha yang sudah ada
      # (immutable rule per-tenant). Re-run workflow di commit yang sama →
      # lewati build, langsung deploy image yang sudah ada. Juga mempercepat
      # redeploy karena tidak build ulang image identik.
      - name: Check existing image
        id: existing
        if: steps.check.outputs.skip != 'true'
        run: |
          IMG="registry.flazhost.com/${{ vars.HARBOR_PROJECT }}/${{ github.event.repository.name }}:${{ github.sha }}"
          if docker manifest inspect "$IMG" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Image commit ini sudah ada di registry — build dilewati, langsung deploy."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true' && steps.existing.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3
      - name: Build and push image
        if: steps.check.outputs.skip != 'true' && steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            registry.flazhost.com/${{ vars.HARBOR_PROJECT }}/${{ github.event.repository.name }}:${{ github.sha }}
            registry.flazhost.com/${{ vars.HARBOR_PROJECT }}/${{ github.event.repository.name }}:latest

  deploy:
    needs: build
    # Job-level guard: skip SEBELUM matrix expand kalau CAPROVER_TARGETS kosong —
    # matrix dari array kosong (fromJSON('[]')) bikin GitHub Actions GAGAL
    # ("Matrix vector 'target' does not contain any values").
    if: ${{ needs.build.outputs.skip != 'true' && vars.CAPROVER_TARGETS != '' && vars.CAPROVER_TARGETS != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(vars.CAPROVER_TARGETS || '[]') }}
    steps:
      - name: Deploy ${{ matrix.target.app }} to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets[matrix.target.server_secret] }}
          app: ${{ matrix.target.app }}
          token: ${{ secrets[matrix.target.token_secret] }}
          image: registry.flazhost.com/${{ vars.HARBOR_PROJECT }}/${{ github.event.repository.name }}:${{ github.sha }}
