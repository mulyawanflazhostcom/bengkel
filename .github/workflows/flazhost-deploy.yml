name: Build & Deploy to FlazHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Guard: skip kalau HARBOR secrets / CAPROVER_TARGETS belum ter-set (race
      # condition initial commit vs setupGithubActionsCD push secrets). Workflow
      # SUCCESS dengan warning, tidak fail. Push berikutnya jalan normal.
      - name: Check config
        id: check
        env:
          HU: ${{ secrets.HARBOR_USERNAME }}
          TARGETS: ${{ vars.CAPROVER_TARGETS }}
        run: |
          if [ -z "$HU" ] || [ -z "$TARGETS" ] || [ "$TARGETS" = "[]" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::FlazHost secrets/targets are not set yet. Build & deploy skipped. Once CD setup is done (or you commit again), the workflow runs normally."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Log in to FlazHost Registry
        if: steps.check.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: registry.flazhost.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      # Immutable tag guard: Harbor menolak push ulang tag sha yang sudah ada.
      # Re-run di commit yang sama → lewati build, langsung deploy image lama.
      - name: Check existing image
        id: existing
        if: steps.check.outputs.skip != 'true'
        run: |
          IMG="registry.flazhost.com/${{ vars.HARBOR_PROJECT }}/${{ github.event.repository.name }}:${{ github.sha }}"
          if docker manifest inspect "$IMG" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Image commit ini sudah ada di registry — build dilewati, langsung deploy."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true' && steps.existing.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3
      - name: Build and push image
        if: steps.check.outputs.skip != 'true' && steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            registry.flazhost.com/${{ vars.HARBOR_PROJECT }}/${{ github.event.repository.name }}:${{ github.sha }}
            registry.flazhost.com/${{ vars.HARBOR_PROJECT }}/${{ github.event.repository.name }}:latest

  deploy:
    needs: build
    if: needs.build.outputs.skip != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Satu repo bisa punya banyak app (Model B). fromJSON('[]') saat var
        # kosong → matrix kosong → job di-skip tanpa error.
        target: ${{ fromJSON(vars.CAPROVER_TARGETS || '[]') }}
    steps:
      - name: Deploy ${{ matrix.target.app }} to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets[matrix.target.server_secret] }}
          app: ${{ matrix.target.app }}
          token: ${{ secrets[matrix.target.token_secret] }}
          image: registry.flazhost.com/${{ vars.HARBOR_PROJECT }}/${{ github.event.repository.name }}:${{ github.sha }}
